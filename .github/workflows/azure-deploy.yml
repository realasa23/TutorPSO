name: Build & Deploy to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: tutorpso14.azurecr.io
  IMAGE_NAME: tutorpso-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Trigger Azure redeploy
        env:
          WEBHOOK_URL: ${{ secrets.AZURE_WEBHOOK_URL }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Status: $HTTP"
          if [[ "$HTTP" == "200" ]] || [[ "$HTTP" == "202" ]]; then
            echo "✅ Deploy triggered"
          else
            echo "❌ Failed: $HTTP"
            exit 1
          fi
          - name: Force restart Azure Web App
            uses: azure/login@v1
            with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}
          
          - name: Restart Web App
            run: |
              az webapp restart \
                --name tutorpso14 \
                --resource-group <Tutor>
