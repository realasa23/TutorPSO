name: Build & Deploy to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: tutorpso14.azurecr.io
  IMAGE_NAME: tutorpso-app

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Trigger Azure to pull new image
        run: |
          PP='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
          KUDU_USER=$(echo "$PP" | grep -oP '(?<=userName=")[^"]+' | head -1)
          KUDU_PASS=$(echo "$PP" | grep -oP '(?<=userPWD=")[^"]+' | head -1)

          echo "Triggering container refresh..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://tutorpso14.scm.azurewebsites.net/api/docker/webhook" \
            -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deployment triggered successfully"
          else
            echo "❌ Failed with HTTP $HTTP_STATUS"
            exit 1
          fi