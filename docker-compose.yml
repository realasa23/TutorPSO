version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutorpso_app
    ports:
      - "8000:80"
    environment:
      APP_NAME: TutorPSO
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-dbtutor_pppltutor}
      DB_USERNAME: ${DB_USERNAME:-tutor_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app/public
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: tutorpso_db
    environment:
      DB_CONNECTION=pgsql
      DB_HOST=aws-1-ap-northeast-1.pooler.supabase.com
      DB_PORT=6543
      DB_DATABASE=postgres
      DB_USERNAME=postgres.spzxnzybmhjdqzlcuegp
      DB_PASSWORD=TutorPso26!
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
